version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    restart: always
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
